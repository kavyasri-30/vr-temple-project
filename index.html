<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple VR Walkthrough</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>

<body>

<!-- TOP NAV -->
<div id="top-nav">
    <button id="menu-btn">☰ Menu</button>
    <button id="vr-btn">VR Mode</button>
    <button id="fullscreen-btn">Fullscreen</button>
</div>

<!-- SIDE MENU -->
<div id="side-menu" class="hidden">
    <button id="close-menu">×</button>
    <h2>Locations</h2>
    <ul id="location-list">
        <li data-target="entrance">Entrance</li>
        <li data-target="left1">Left Path</li>
        <li data-target="main8">Main Hall</li>
    </ul>
</div>

<!-- LOADING -->
<div id="loading-screen">
    <h1>Temple VR Walkthrough</h1>
    <p>Loading immersive experience...</p>
</div>

<!-- INFO PANEL -->
<div id="info-panel">
    <h2 id="info-title"></h2>
    <p id="info-desc"></p>
</div>

<!-- MODAL -->
<div id="info-modal" class="hidden">
    <button id="close-modal">×</button>
    <h2 id="modal-title"></h2>
    <img id="modal-img" class="hidden">
    <p id="modal-desc"></p>
</div>

<!-- SCENE -->
<a-scene loading-manager>

    <!-- FIXED IMAGES -->
    <a-assets>
        <img id="entrance" src="entrance.jpg">
        <img id="left1" src="left1.jpg">
        <img id="left3" src="left3.jpg">
        <img id="left4" src="left4.jpg">
        <img id="left5" src="left5.jpg">
        <img id="right6" src="right6.jpg">
        <img id="right7" src="right7.jpg">
        <img id="main8" src="main8.jpg">
        <img id="god" src="god9.jpg">

        <!-- ICONS -->
        <img id="point-nav" src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
        <img id="arrow-up" src="https://cdn-icons-png.flaticon.com/512/271/271228.png">
        <img id="arrow-down" src="https://cdn-icons-png.flaticon.com/512/271/271210.png">
        <img id="arrow-left" src="https://cdn-icons-png.flaticon.com/512/271/271220.png">
        <img id="arrow-right" src="https://cdn-icons-png.flaticon.com/512/271/271228.png">
        <img id="info-icon" src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png">
    </a-assets>

    <!-- SKY -->
    <a-sky id="vr-sky" src="#entrance"></a-sky>

    <!-- HOTSPOTS -->
    <a-entity id="hotspots-container"></a-entity>

    <!-- CAMERA -->
    <a-entity id="rig">
        <a-camera look-controls>
            <a-cursor></a-cursor>
        </a-camera>
    </a-entity>

</a-scene>

</body>
</html>
