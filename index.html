<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple VR Walkthrough</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            z-index: 10;
        }
    </style>
</head>

<body>

<div id="loading">Loading VR...</div>

<a-scene>

    <!-- IMAGES (NO assets/) -->
    <a-assets>
        <img id="entrance" src="entrance.jpg">
        <img id="left1" src="left1.jpg">
        <img id="left3" src="left3.jpg">
        <img id="left4" src="left4.jpg">
        <img id="left5" src="left5.jpg">
        <img id="right6" src="right6.jpg">
        <img id="right7" src="right7.jpg">
        <img id="main8" src="main8.jpg">
    </a-assets>

    <!-- SKY -->
    <a-sky id="sky" src="#entrance"></a-sky>

    <!-- HOTSPOTS -->
    <a-entity id="hotspots"></a-entity>

    <!-- CAMERA -->
    <a-camera position="0 1.6 0">
        <a-cursor></a-cursor>
    </a-camera>

</a-scene>

<script>
const scenes = {
    entrance: [
        { target: "left1", position: "-1 1 -3" }
    ],
    left1: [
        { target: "left3", position: "-1 1 -3" },
        { target: "entrance", position: "1 1 -3" }
    ],
    left3: [
        { target: "left4", position: "-1 1 -3" },
        { target: "left1", position: "1 1 -3" }
    ],
    left4: [
        { target: "left5", position: "-1 1 -3" },
        { target: "left3", position: "1 1 -3" }
    ],
    left5: [
        { target: "right6", position: "0 1 -3" },
        { target: "left4", position: "1 1 -3" }
    ],
    right6: [
        { target: "right7", position: "1 1 -3" },
        { target: "left5", position: "-1 1 -3" }
    ],
    right7: [
        { target: "main8", position: "1 1 -3" },
        { target: "right6", position: "-1 1 -3" }
    ],
    main8: [
        { target: "left3", position: "-1 1 -3" },
        { target: "right7", position: "1 1 -3" }
    ]
};

const sky = document.querySelector("#sky");
const container = document.querySelector("#hotspots");

function loadScene(scene) {
    sky.setAttribute("src", "#" + scene);

    container.innerHTML = "";

    scenes[scene].forEach(h => {
        const el = document.createElement("a-sphere");
        el.setAttribute("position", h.position);
        el.setAttribute("radius", "0.2");
        el.setAttribute("color", "red");
        el.setAttribute("class", "clickable");

        el.addEventListener("click", () => {
            loadScene(h.target);
        });

        container.appendChild(el);
    });
}

loadScene("entrance");

window.onload = () => {
    document.getElementById("loading").style.display = "none";
};
</script>

</body>
</html>
